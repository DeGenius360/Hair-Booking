version: '3'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - ./.env.dev
    depends_on:
      - db

  db:
    image: postgres:13-alpine
    volumes:
      - hair_booking_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: hair_booking_dev
      POSTGRES_USER: hair_booking
      POSTGRES_PASSWORD: password

volumes:
  hair_booking_data: 
